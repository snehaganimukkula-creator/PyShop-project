{% extends 'base.html' %}
{% block content %}
<h1>Products</h1>
<div class="container">
    <div class="row">
        {% for product in products %}
            <div class="col-sm-6 col-md-3">
                <div class="card">
                    <img src="{{ product.image_url }}"
                         class="card-img-top"
                         alt="{{ product.name }}">
                    <div class="card-body">
                        <h5 class="card-title">{{ product.name }}</h5>
                        <p class="card-text">${{ product.price }}</p>
                        <a href="#" class="btn btn-primary">Add to Cart</a>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
